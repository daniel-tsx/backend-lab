<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Backend Lab</title>
  <!-- Favicon master: the Backbone B simplified for small sizes — no terminal
       dots, heavier stroke. Keep this STATIC (favicons render a single frame). -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="#8b5cf6" />
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M19 15 V49" />
    <path d="M19 15 H32 a9.5 8.5 0 0 1 0 17 H19" />
    <path d="M19 32 H35 a9.5 8.5 0 0 1 0 17 H19" />
  </g>
  <!-- teal lab spark: the one accent that must never drop -->
  <circle cx="19" cy="32" r="5" fill="#2dd4bf" />
</svg>
